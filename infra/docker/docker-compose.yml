version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: egocentric
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: ../../services/api
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis

  pipeline:
    build: ../../services/pipeline
    depends_on:
      - redis
